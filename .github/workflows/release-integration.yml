name: Release Integration

on:
  push:
    tags:
      - 'integrations/**'
  release:
    types: [published]

jobs:
  publish:
    name: Publish Integration to PyPI
    # If triggered by release, ensure it's an integration tag
    if: github.event_name == 'push' || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'integrations/'))
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract integration info
      id: info
      run: |
        # refs/tags/integrations/crewai/v0.1.0 -> integration=crewai, version=0.1.0
        TAG="${GITHUB_REF#refs/tags/}"
        INTEGRATION=$(echo "$TAG" | cut -d'/' -f2)
        VERSION=$(echo "$TAG" | cut -d'/' -f3 | sed 's/^v//')
        echo "integration=$INTEGRATION" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Integration: $INTEGRATION, Version: $VERSION"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Build Python package
      working-directory: ./integrations/${{ steps.info.outputs.integration }}
      run: uv build --out-dir dist

    - name: Publish Python package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: ./integrations/${{ steps.info.outputs.integration }}/dist
        skip-existing: true
