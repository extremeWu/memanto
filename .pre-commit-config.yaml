repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy type check
        entry: uv run mypy .
        language: system
        pass_filenames: false
        always_run: true
